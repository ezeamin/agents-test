services:

  # ──────────────────────────────────────────────────────────────────────────
  # Nova Agent (Pipecat voice pipeline)
  # network_mode: host is required so that aiortc can bind directly to the
  # host network interfaces for WebRTC ICE candidate discovery on EC2.
  # With host networking the agent reaches the STT/TTS services via localhost.
  # ──────────────────────────────────────────────────────────────────────────
  nova-agent:
    build: .
    container_name: strata_nova_agent
    command: uv run src/agent.py --host 0.0.0.0
    network_mode: host
    env_file:
      - .env
    depends_on:
      - stt-whisper
      - tts-chatterbox

  # ──────────────────────────────────────────────────────────────────────────
  # Speech-to-Text Service (WhisperLiveKit)
  # WebSocket endpoint: ws://localhost:8000/asr
  # Protocol: raw 16kHz PCM (--pcm-input required by our Pipecat plugin)
  # ──────────────────────────────────────────────────────────────────────────
  stt-whisper:
    build:
      context: ./services/whisperlivekit
    container_name: strata_stt
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      # Unified cache for all runtime downloads (HuggingFace models, torch, etc.)
      # /root/.cache inside the container is symlinked to /app/cache so every
      # library that writes to ~/.cache ends up here regardless of which env var
      # it respects (HF_HOME, XDG_CACHE_HOME, or the raw ~/.cache path).
      # On EC2: replace ./cache with the absolute path of the partition dedicated
      # to large model files so the root partition doesn't fill up.
      - ./cache:/app/cache
      # GPU device access (required on some Linux hosts for compute)
      - /dev/dri:/dev/dri
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, utility, compute]
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      # Override default model size at runtime (tiny|base|small|medium|large)
      - WHISPER_MODEL=${WHISPER_MODEL:-medium}
      - WHISPER_LANG=${WHISPER_LANG:-es}
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────────────
  # Text-to-Speech Service (Chatterbox — multilingual fork)
  # HTTP endpoint: http://localhost:8004/tts
  # Also supports OpenAI-compatible: http://localhost:8004/v1/audio/speech
  # ──────────────────────────────────────────────────────────────────────────
  tts-chatterbox:
    # temporarily replaced with dockerhub image because build is not working
    # build:
    #   context: ./services/chatterbox
    # container_name: strata_tts
    # env_file: .env
    # ports:
    #   - "8004:8004"
    # volumes:
    #   # Unified cache shared with stt-whisper — both pull HuggingFace models.
    #   # Same bind-mount path so they share downloads on the same host partition.
    #   # Voices are NOT mounted here: they come bundled with the repo clone inside
    #   # the image (git clone includes the voices/ directory). To add custom voices
    #   # after deploy, use: docker cp ./my-voice.wav strata_tts:/build/multilingual/voices/
    #   - ./cache:/app/cache
    #   - ./juanma/cache:/app/hf_cache
    #   - ./outputs:/app/outputs
    #   - ./voices:/app/voices
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    # environment:
    #   - HF_TOKEN=${HF_TOKEN}
    #   - HF_HOME=/app/hf_cache
    #   - PYTHONDONTWRITEBYTECODE=1
    #   - PYTHONUNBUFFERED=1
    # restart: unless-stopped

    image: gonzaloanavarrot/strata-agents-tts:chatterbox-0.1
    container_name: strata-tts
    env_file: .env
    ports:
      - "8004:8004"
    volumes:
      # Use the same base cache directory for TTS
      - ./juanma/cache:/app/hf_cache
      - ./outputs:/app/outputs
      - ./voices:/app/voices
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/app/hf_cache
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────────────
  # Piper TTS (optional — uncomment to use local open-source TTS instead)
  # Set TTS_SERVICE_PROVIDER=PIPER in .env to activate.
  # Requires voice .onnx + config files in ./voice/
  # ──────────────────────────────────────────────────────────────────────────
  # piper-server:
  #   build:
  #     context: ./scripts/piper
  #   container_name: strata_piper_tts
  #   volumes:
  #     - ./voice:/app/voice
  #   environment:
  #     - PIPER_PORT=5002
  #     - CURRENT_VOICE=${CURRENT_VOICE}
  #     - CURRENT_VOICE_CONFIG=${CURRENT_VOICE_CONFIG}
  #   ports:
  #     - "5002:5002"

# ──────────────────────────────────────────────────────────────────────────────
# Named volumes not used — bind-mounts above give direct host path access.
# For Kubernetes: replace ./cache bind-mounts with a single PersistentVolumeClaim
# shared between stt and tts pods to avoid re-downloading models on pod restart.
# ──────────────────────────────────────────────────────────────────────────────
